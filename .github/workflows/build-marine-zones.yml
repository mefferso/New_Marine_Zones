name: Build marine zone GeoJSON

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/build_marine_zones.py'
      - '.github/workflows/build-marine-zones.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pyshp

      - name: Build GeoJSON from official NWS marine zones
        run: python scripts/build_marine_zones.py

      - name: Show generated files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          gj = json.loads(Path('data/new_marine_zones.geojson').read_text())
          print('Feature count:', len(gj['features']))
          print('IDs:', ', '.join(f['properties'].get('ID','?') for f in gj['features']))
          PY

      - name: Commit generated GeoJSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/new_marine_zones.geojson data/source_manifest.json data/source_zips/*.zip
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Build April 2026 marine zone GeoJSON"
            git push
          fi
